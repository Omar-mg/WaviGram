name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @wagigram/${{ matrix.package }} lint

      - name: TypeCheck
        run: pnpm --filter @wavigram/${{ matrix.package }} typecheck

      - name: Build
        run: pnpm --filter @wavigram/${{ matrix.package }} build

