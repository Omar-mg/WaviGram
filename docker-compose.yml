version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-wavigram}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for caching, Socket.IO adapter, etc.)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Uncomment if you have a password
    # command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB host to point to the db service
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    # Uncomment the following line to enable hot-reloading in development
    # command: pnpm dev

  # Frontend Web App
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "5173:5173"
    # For development with Vite HMR, you can override command and volume
    # command: pnpm dev
    # volumes:
    #   - ./apps/web:/app
    #   - /app/node_modules

volumes:
  postgres_data: